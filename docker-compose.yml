services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs
    restart: always
    env_file:
      - .env
    # MINIO_ENDPOINT only — other MinIO vars come from `.env` (same file on VPS after deploy merge).
    environment:
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postAdvocade
      POSTGRES_PASSWORD: post_advocade_65&65
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    # MinIO credentials: read from `.env` (updated on deploy from GitHub secrets via scripts/merge_minio_env.py).
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -e;
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb -p "local/$$MINIO_BUCKET" || true;
      echo "MinIO ready";

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: